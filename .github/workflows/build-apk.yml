name: Build Hikari Novel APK

于:
  workflow_dispatch: # 保留手动触发按钮

env:
  # 提前启用 Node.js 24 环境，消除 Node 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest # 编译安卓 APK 使用 Linux 环境即可

    steps:
      - name: 检出代码 (Checkout Repository)
        uses: actions/checkout@v4

      - name: 配置 Java 环境 (Setup Java)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 配置 Flutter 环境 (Setup Flutter)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7' 
          channel: 'stable'

      - name: 获取依赖包 (Pub Get)
        run: flutter pub get

      - name: 编译 Release APK (Build APK)
        run: flutter build apk --release

      - name: 上传安装包 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
