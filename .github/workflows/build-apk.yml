name: Build Hikari Novel APK

on:
  workflow_dispatch: # 保留手动触发按钮

env:
  # 提前启用 Node.js 24 环境，消除 Node 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest # 编译安卓 APK 使用 Linux 环境即可

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Flutter 官方推荐的 Java 发行版
          java-version: '17'   # 较新的 Android 编译工具链通常需要 Java 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'  # 严格对齐作者的 Flutter 版本
          channel: 'stable'          # 对应作者的 stable 分支

      - name: Pub Get
        run: flutter pub get

      - name: Build APK (ARM64 + Obfuscation)
        # 指定 arm64 架构，开启混淆，并把调试信息分离到 build/app/outputs/symbols 文件夹
        run: flutter build apk --release --target-platform android-arm64 --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Upload Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7 # 安装包在 GitHub 上保留 7 天

      - name: Upload Artifact (Debug Symbols)
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-debug-symbols
          path: build/app/outputs/symbols
          retention-days: 7 # 调试符号表也保留 7 天
